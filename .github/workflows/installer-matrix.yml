name: Installer Matrix

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test-installers:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Run Installer (Linux/macOS)
        if: runner.os != 'Windows'
        env:
          RABTO_SOURCE_DIR: ${{ github.workspace }}
        run: |
          chmod +x installers/install.sh
          ./installers/install.sh
          export PATH="$HOME/.local/bin:$PATH"
          rabto --version
          
      - name: Run Installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          RABTO_SOURCE_DIR: ${{ github.workspace }}
        run: |
          ./installers/install.ps1
          $env:PATH += ";$env:USERPROFILE\.local\bin"
          rabto.cmd --version

      - name: Run Uninstaller (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x installers/uninstall.sh
          ./installers/uninstall.sh
          
      - name: Run Uninstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./installers/uninstall.ps1
