name: Website Tests

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build Docs for Preview Artifact
        run: npm run docs:build -w website

      - name: Upload Pages Preview Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pages-preview-artifact
          path: website/source/.vitepress/dist/
          retention-days: 7

      - name: Run Playwright tests
        run: npm run test:e2e -w website

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            website/test-results/
            website/playwright-report/
          retention-days: 7
